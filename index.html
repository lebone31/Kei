<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Birthday Candle</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    font-family: Arial, sans-serif;
}

/* Center everything perfectly */
.container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
}

/* Text */
h1 {
    color: white;
    font-size: 30px;
    text-align: center;
    margin: 0;
}

/* Candle */
.candle {
    position: relative;
    width: 50px;
    height: 140px;
    background: linear-gradient(#fff, #e6e6e6);
    border-radius: 10px;
    display: flex;
    justify-content: center;
}

/* Flame */
.flame {
    width: 18px;
    height: 28px;
    background: orange;
    border-radius: 50%;
    position: absolute;
    top: -30px;
    box-shadow: 0 0 20px orange;
    animation: flicker 0.2s infinite alternate;
}

@keyframes flicker {
    from { transform: scale(1); opacity: 1; }
    to { transform: scale(1.2); opacity: 0.7; }
}

/* Plate */
.plate {
    width: 120px;
    height: 10px;
    background: white;
    border-radius: 50%;
    position: absolute;
    bottom: -10px;
}

/* Button */
button {
    padding: 10px 15px;
    border: none;
    border-radius: 10px;
    background: white;
    cursor: pointer;
}

/* Balloons */
.balloon {
    position: absolute;
    bottom: -100px;
    width: 30px;
    height: 40px;
    border-radius: 50%;
    animation: float 6s linear infinite;
}

@keyframes float {
    from { transform: translateY(0); opacity: 1; }
    to { transform: translateY(-120vh); opacity: 0; }
}
</style>
</head>

<body>

<div class="container">
    <h1>🎉 Make a Wish 🎉</h1>

    <div class="candle">
        <div class="flame" id="flame"></div>
        <div class="plate"></div>
    </div>

    <button onclick="start()">Play Song & Blow Candle 🎵</button>
</div>

<script>

let audioCtx;
let flame = document.getElementById("flame");

/* REAL HAPPY BIRTHDAY MELODY */
function playBirthdaySong() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    const notes = [
        264, 264, 297, 264, 352, 330,
        264, 264, 297, 264, 396, 352,
        264, 264, 528, 440, 352, 330, 297,
        466, 466, 440, 352, 396, 352
    ];

    let time = audioCtx.currentTime;

    notes.forEach(freq => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        osc.frequency.value = freq;
        osc.type = "sine";

        osc.connect(gain);
        gain.connect(audioCtx.destination);

        gain.gain.setValueAtTime(0.2, time);
        gain.gain.exponentialRampToValueAtTime(0.001, time + 0.4);

        osc.start(time);
        osc.stop(time + 0.4);

        time += 0.4;
    });
}

/* BALLOONS */
function balloons() {
    for (let i = 0; i < 15; i++) {
        const b = document.createElement("div");
        b.className = "balloon";
        b.style.left = Math.random() * window.innerWidth + "px";
        b.style.background = `hsl(${Math.random()*360},70%,60%)`;
        b.style.animationDuration = (4 + Math.random()*4) + "s";
        document.body.appendChild(b);
    }
}

    .then(stream => {
        const audio = new AudioContext();
        const mic = audio.createMediaStreamSource(stream);
        const analyser = audio.createAnalyser();
        mic.connect(analyser);

        const data = new Uint8Array(analyser.
